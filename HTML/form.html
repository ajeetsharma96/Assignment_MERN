<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css"></link>
</head>
<body>
    
    <div id="form">
                     <h1 style="text-align:center">Login Form</h1>
        <form action="">
            
                <label for="username" class="username"><b>Enter Username:</b> </label>
                <input type="text" class="username" name="" placeholder="Username"><br><br>
            
            <div>
            <label for="email"><b>Enter Email: </b></label>
            <input type="email" name="email" placeholder="Email"><br><br>
            </div>
            
            <label for="password"><b>Enter Password: </b></label>
            <input type="text" name="pass" placeholder="Password"><br><br>
            <label for="enrollment"><b>Enter Enrollment: </b></label>
            <input type="number" name="enrollment" placeholder="Enrollment"><br><br>

        </form>
    </div>
    <button type="submit" id="submit">Submit</button>

</body>
</html>
